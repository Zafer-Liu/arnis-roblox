name: Build Windows CLI

on:
  workflow_dispatch:

jobs:
  build:
    name: Build arbx_cli for Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build CLI
        run: cargo build --release --manifest-path rust/Cargo.toml -p arbx_cli

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: arbx_cli-windows
          path: rust/target/release/arbx_cli.exe
