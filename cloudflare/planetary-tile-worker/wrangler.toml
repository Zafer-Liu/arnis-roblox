name = "planetary"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Account ID and API token live in `~/.config/wrangler/config.toml` or
# the `CLOUDFLARE_API_TOKEN` env var. Run `wrangler login` once to set
# them up. The user already has Cloudflare credentials configured.

[vars]
DEFAULT_TILE_PROVIDER = "esri"
TILE_CACHE_TTL_SECONDS = "604800" # 7 days

# KV namespace for cached tile RGBA blobs.
[[kv_namespaces]]
binding = "TILE_CACHE"
id = "af94966793d94427a9c9cd9ecca6baad"

# KV namespace for telemetry runs (POST /telemetry/run, GET /telemetry/latest).
[[kv_namespaces]]
binding = "TELEMETRY"
id = "99725180e223400d9efb44b22cd34c48"
preview_id = "10c79aca019d44559322118c35535bb0"

# R2 bucket for compiled city manifests.
[[r2_buckets]]
binding = "MANIFESTS"
bucket_name = "planetary-manifests"

# After first `wrangler deploy` the worker is live at:
#   https://planetary.adpena.workers.dev/health
#   https://planetary.adpena.workers.dev/tile/esri/{z}/{x}/{y}
#   https://planetary.adpena.workers.dev/manifests/{name}.json
